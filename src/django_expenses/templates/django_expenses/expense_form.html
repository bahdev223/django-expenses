<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if object %}Modifier{% else %}Nouvelle{% endif %} dépense - django-expenses</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-xl mx-auto px-4 py-8">
        <a href="{% url 'expenses:list' %}" class="text-blue-600 hover:underline mb-4 inline-block">&larr; Retour</a>
        <h1 class="text-2xl font-bold text-gray-800 mb-6">
            {% if object %}Modifier la dépense{% else %}Nouvelle dépense{% endif %}
        </h1>

        <form method="post" class="bg-white rounded-lg shadow p-6">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                <p class="text-xs text-gray-500 mt-1">{{ field.help_text }}</p>
                {% endif %}
                {% if field.errors %}
                <p class="text-red-600 text-sm mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}
            <div class="flex justify-end space-x-3 mt-6">
                <a href="{% url 'expenses:list' %}" class="px-4 py-2 border border-gray-300 rounded text-gray-700 hover:bg-gray-50">Annuler</a>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                    {% if object %}Enregistrer{% else %}Créer{% endif %}
                </button>
            </div>
        </form>
    </div>
</body>
</html>
