<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supprimer - django-expenses</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-xl mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow p-6 text-center">
            <h1 class="text-2xl font-bold text-gray-800 mb-4">Confirmer la suppression</h1>
            <p class="text-gray-600 mb-2">Voulez-vous vraiment supprimer cette dépense ?</p>
            <p class="text-sm text-gray-500 mb-6">
                {{ expense.reference_number|default:"-" }} — {{ expense.total_amount|floatformat:0 }} {{ expense.currency }}
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="flex justify-center space-x-4">
                    <a href="{% url 'expenses:list' %}" class="px-4 py-2 border border-gray-300 rounded text-gray-700 hover:bg-gray-50">Annuler</a>
                    <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">Confirmer la suppression</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
